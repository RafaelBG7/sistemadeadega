<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Adega</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Sistema de Adega</h1>
    <div class="tabs">
        <button class="tab-button" onclick="openTab('categoria')">Categoria</button>
        <button class="tab-button" onclick="openTab('marca')">Marca</button>
        <button class="tab-button" onclick="openTab('produto')">Produto</button>
        <button class="tab-button" onclick="openTab('vendas')">Vendas</button>
        <button class="tab-button" onclick="openTab('vendedor')">Vendedor</button>
    </div>
    <div id="categoria" class="tab-content active-tab">
        {% include 'categoria.html' %}
    </div>
    <div id="marca" class="tab-content">
        {% include 'marca.html' %}
    </div>
    <div id="produto" class="tab-content">
        {% include 'produto.html' %}
    </div>
    <div id="vendas" class="tab-content">
        {% include 'vendas.html' %}
    </div>
    <div id="vendedor" class="tab-content">
        {% include 'vendedor.html' %}
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
